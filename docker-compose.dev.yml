services:
  postgres:
    image: postgres:16-alpine
    container_name: mypaas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-mypaas_dev}
      PGTZ: UTC
      TZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mypaas_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    container_name: mypaas-caddy-dev
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: mypaas-dev
