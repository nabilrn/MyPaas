services:
  postgres:
    image: postgres:16-alpine
    container_name: mypaas-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mypaas-api
    restart: always
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      GITHUB_CALLBACK_URL: ${GITHUB_CALLBACK_URL}
      FRONTEND_URL: https://${PUBLIC_DOMAIN}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      DOCKER_SOCKET: ${DOCKER_SOCKET}
      DOCKER_BIND_HOST: ${DOCKER_BIND_HOST:-127.0.0.1}
      PROJECT_NETWORK: ${PROJECT_NETWORK:-mypaas-prod}
      CADDY_ADMIN: caddy:2019
      CADDY_UPSTREAM_HOST: ${CADDY_UPSTREAM_HOST:-host.docker.internal}
      STATIC_ROOT: ${STATIC_ROOT:-/var/lib/mypaas/static}
      CADDY_STATIC_ROOT: ${CADDY_STATIC_ROOT:-/var/lib/mypaas/static}
      SHARED_POSTGRES_ENABLED: ${SHARED_POSTGRES_ENABLED:-true}
      SHARED_POSTGRES_HOST: ${SHARED_POSTGRES_HOST:-postgres}
      SHARED_POSTGRES_PORT: ${SHARED_POSTGRES_PORT:-5432}
      SHARED_POSTGRES_SSLMODE: ${SHARED_POSTGRES_SSLMODE:-disable}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_DIR: ${BACKUP_DIR:-/var/lib/mypaas/backups}
      BACKUP_DAILY_AT: ${BACKUP_DAILY_AT:-02:00}
      BACKUP_TIMEOUT_MINUTES: ${BACKUP_TIMEOUT_MINUTES:-30}
      BACKUP_KEEP_DAILY: ${BACKUP_KEEP_DAILY:-7}
      BACKUP_KEEP_WEEKLY: ${BACKUP_KEEP_WEEKLY:-4}
      BACKUP_WEEKLY_DAY: ${BACKUP_WEEKLY_DAY:-sunday}
      IMAGE_CLEANUP_ENABLED: ${IMAGE_CLEANUP_ENABLED:-true}
      IMAGE_CLEANUP_UNTIL: ${IMAGE_CLEANUP_UNTIL:-168h}
      IMAGE_CLEANUP_WEEKDAY: ${IMAGE_CLEANUP_WEEKDAY:-sunday}
      LOG_LEVEL: info
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${DOCKER_SOCKET}:${DOCKER_SOCKET}
      - /var/lib/mypaas/volumes:/var/lib/mypaas/volumes
      - /var/lib/mypaas/compose:/var/lib/mypaas/compose
      - /var/lib/mypaas/static:/var/lib/mypaas/static
      - /var/lib/mypaas/backups:/var/lib/mypaas/backups
      - /tmp/mypaas/builds:/tmp/mypaas/builds
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mypaas-dashboard
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      ORIGIN: https://${PUBLIC_DOMAIN}

  caddy:
    image: caddy:2-alpine
    container_name: mypaas-caddy-prod
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "80:80"
      - "127.0.0.1:2019:2019"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - /var/lib/mypaas/static:/var/lib/mypaas/static:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN}
      CADDY_ADMIN: "127.0.0.1:2019"
    depends_on:
      - api
      - dashboard

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: mypaas-prod
